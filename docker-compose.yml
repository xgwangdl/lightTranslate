version: '3.8'

services:
  lightTranslate:
    image: crpi-j0cdavp2vpogg3mn.cn-hangzhou.personal.cr.aliyuncs.com/xgwangdl/light_translate
    container_name: light-translate
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://rm-bp1cfwt1ik59yi3my.mysql.rds.aliyuncs.com:3306/light_translate?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=your-password
      - SPRING_AI_DASHSCOPE_API_KEY=sk-your-api-key
      - SPRING_AI_DASH_SCOPE_AUDIO_API_KEY=sk-your-api-key
      - TZ=Asia/Shanghai
    volumes:
      - /etc/localtime:/etc/localtime:ro